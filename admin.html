<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lí thuốc</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <button onclick="logout()">Đăng xuất</button>
    <a href="index.html">
    <button>🏠 Về trang chủ</button>
</a>
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5" alt="medical">
        <div class="overlay">
            <h1> Quản lí thuốc</h1>
            <p>Chăm sóc sức khỏe mỗi ngày</p>
        </div>
    </div>

    <!-- Container -->
    <div class="container">

        <section>
            <h2>👤 Thêm bệnh nhân</h2>
            <input id="patientName" type="text" placeholder="Tên bệnh nhân">
            <button onclick="addPatient()">Thêm</button>
        </section>

        <section>
            <h2> Thêm thuốc</h2>
            <input id="medName" type="text" placeholder="Tên thuốc">
            <button onclick="addMedication()">Thêm</button>
        </section>

        <section>
            <h2> Tạo lịch uống</h2>
            <select id="patientSelect"></select>
            <select id="medSelect"></select>
            <input id="time" type="datetime-local">
            <button onclick="addSchedule()">Tạo lịch</button>
        </section>

        <section>
            <h2> Danh sách lịch uống</h2>
            <div id="scheduleList"></div>
        </section>

    </div>

    <script src="./js/admin.js"></script>
</body>
</html>
