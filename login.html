<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>

    <link rel="stylesheet" href="./css/style.css">

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#74ebd5,#9face6);
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .login-box input:focus {
            outline: none;
            border-color: #6c63ff;
            box-shadow: 0 0 8px rgba(108,99,255,0.3);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg,#6c63ff,#5a54d1);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        #error {
            margin-top: 12px;
            color: red;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="login-box">

        <h2>🔐 Đăng nhập Admin</h2>

        <input
            type="text"
            id="username"
            placeholder="Tên đăng nhập"
        >

        <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
        >

        <button onclick="login()">
            Đăng nhập
        </button>

        <p id="error"></p>

        <br>

        <a href="index.html">
            ← Quay lại trang chủ
        </a>

    </div>

    <script src="./js/login.js"></script>

</body>
</html>
