<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MedReminder Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        .login-page {

            min-height: 100vh;

            display: flex;

            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .login-container {

            width: 100%;
            max-width: 1200px;

            display: grid;
            grid-template-columns: 1.1fr 1fr;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(25px);

            border-radius: 40px;

            overflow: hidden;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .login-left {

            padding: 70px;

            background:
                linear-gradient(135deg,
                    rgba(37, 99, 235, 0.9),
                    rgba(6, 182, 212, 0.7));

            position: relative;

            overflow: hidden;
        }

        .login-left::before {

            content: '';

            position: absolute;

            width: 500px;
            height: 500px;

            border-radius: 50%;

            background: rgba(255, 255, 255, 0.08);

            top: -250px;
            right: -200px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;

            margin-bottom: 80px;

            position: relative;
        }

        .brand-icon {

            width: 70px;
            height: 70px;

            border-radius: 22px;

            background: white;

            color: #2563eb;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 30px;
        }

        .brand h1 {
            font-size: 36px;
            font-weight: 800;
        }

        .left-content {
            position: relative;
        }

        .left-content h2 {

            font-size: 52px;

            line-height: 1.2;

            margin-bottom: 25px;
        }

        .left-content p {

            color: #dbeafe;

            line-height: 1.8;

            font-size: 17px;
        }

        .login-right {

            padding: 70px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
        }

        .login-box h2 {

            font-size: 42px;

            margin-bottom: 15px;
        }

        .login-box p {

            color: #cbd5e1;

            margin-bottom: 40px;
        }

        .input-box {
margin-bottom: 25px;
        }

        .input-box label {

            display: block;

            margin-bottom: 12px;

            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {

            position: absolute;

            top: 50%;
            left: 18px;

            transform: translateY(-50%);

            color: #94a3b8;
        }

        .input-wrapper input {

            width: 100%;

            padding: 18px 18px 18px 52px;

            border: none;
            outline: none;

            border-radius: 18px;

            background: rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 15px;
        }

        .login-btn {

            width: 100%;

            border: none;

            padding: 18px;

            border-radius: 18px;

            background:
                linear-gradient(135deg,
                    #2563eb,
                    #06b6d4);

            color: white;

            font-size: 16px;
            font-weight: 700;

            cursor: pointer;

            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-4px);
        }

        .demo-account {

            margin-top: 35px;

            padding: 25px;

            border-radius: 22px;

            background: rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .demo-account h3 {
            margin-bottom: 15px;
        }

        .demo-account p {
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        @media(max-width:1000px) {

            .login-container {
                grid-template-columns: 1fr;
            }

            .login-left {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div class="login-page">

        <div class="login-container">

            <!-- LEFT -->

            <div class="login-left">

                <div class="brand">

                    <div class="brand-icon">
                        <i class="fa-solid fa-heart-pulse"></i>
                    </div>

                    <h1>MedReminder</h1>

                </div>

                <div class="left-content">

                    <h2>
                        Hệ thống nhắc uống thuốc thông minh
                    </h2>

                    <p>
                        Quản lý thuốc, theo dõi lịch uống,
                        nhắc giờ điều trị và quản lý bệnh nhân
                        trên nền tảng hiện đại.
                    </p>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="login-right">

                <div class="login-box">

                    <h2>Đăng nhập</h2>

                    <p>
                        Chọn tài khoản để truy cập hệ thống.
                    </p>
<!-- USERNAME -->

                    <div class="input-box">

                        <label>Tài khoản</label>

                        <div class="input-wrapper">

                            <i class="fa-solid fa-user"></i>

                            <input type="text" id="username" placeholder="Nhập tài khoản">

                        </div>

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-box">

                        <label>Mật khẩu</label>

                        <div class="input-wrapper">

                            <i class="fa-solid fa-lock"></i>

                            <input type="password" id="password" placeholder="Nhập mật khẩu">

                        </div>

                    </div>

                    <!-- BUTTON -->

                    <button class="login-btn" onclick="login()">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        Đăng nhập
                    </button>

                    <!-- DEMO -->

                    <div class="demo-account">

                        <h3>Tài khoản demo</h3>

                        <p>
                            👨‍⚕️ Admin:
                            <b>admin / 123</b>
                        </p>

                        <p>
                            👤 User:
                            <b>user / 123</b>
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
